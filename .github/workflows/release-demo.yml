name: Release Flow (Step 1 - Confluence + Slack)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  validate-branch:
    name: Validate Branch
    runs-on: ubuntu-latest

    outputs:
      branch_name: ${{ steps.branch_check.outputs.branch_name }}

    steps:
      - name: Check branch name
        id: branch_check
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"

          echo "Current branch: $BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          if [[ "$BRANCH_NAME" == "master" || "$BRANCH_NAME" =~ ^release-.*$ ]]; then
            echo "Branch is valid"
          else
            echo "Invalid branch: $BRANCH_NAME"
            exit 1
          fi

  init-release:
    name: Init Release
    runs-on: ubuntu-latest
    needs: validate-branch

    outputs:
      project: ${{ steps.meta.outputs.project }}
      version: ${{ steps.meta.outputs.version }}
      date: ${{ steps.meta.outputs.date }}
      short_date: ${{ steps.meta.outputs.short_date }}
      date_iso: ${{ steps.meta.outputs.date_iso }}
      title: ${{ steps.meta.outputs.title }}
      tags: ${{ steps.meta.outputs.tags }}
      branch_name: ${{ steps.meta.outputs.branch_name }}

    env:
      PROJECT: postman-test

    steps:
      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DATE=$(date +'%d.%m.%Y')
          SHORT_DATE=$(date +'%d.%m')
          DATE_ISO=$(date +'%Y-%m-%d')
          BRANCH_NAME="${{ needs.validate-branch.outputs.branch_name }}"

          TITLE="Draft $PROJECT v$VERSION"
          TAGS="#releaseb2b #релиз$SHORT_DATE #$PROJECT v$VERSION"

          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "short_date=$SHORT_DATE" >> "$GITHUB_OUTPUT"
          echo "date_iso=$DATE_ISO" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Debug output
        shell: bash
        run: |
          echo "Project: ${{ steps.meta.outputs.project }}"
          echo "Version: ${{ steps.meta.outputs.version }}"
          echo "Date: ${{ steps.meta.outputs.date }}"
          echo "Short date: ${{ steps.meta.outputs.short_date }}"
          echo "Date ISO: ${{ steps.meta.outputs.date_iso }}"
          echo "Title: ${{ steps.meta.outputs.title }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Branch: ${{ steps.meta.outputs.branch_name }}"

  create-confluence-page:
    name: Create Confluence Page
    runs-on: ubuntu-latest
    needs: init-release

    outputs:
      page_url: ${{ steps.create.outputs.page_url }}

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create Confluence page
        id: create
        shell: bash
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          SPACE_ID: ${{ secrets.CONFLUENCE_SPACE_ID }}
          PARENT_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}

          TITLE: ${{ needs.init-release.outputs.title }}
          DATE: ${{ needs.init-release.outputs.date_iso }}
          SHORT_DATE: ${{ needs.init-release.outputs.short_date }}
          VERSION: ${{ needs.init-release.outputs.version }}
          PROJECT: ${{ needs.init-release.outputs.project }}
          BRANCH: ${{ needs.init-release.outputs.branch_name }}
          TAGS: ${{ needs.init-release.outputs.tags }}

          CP_FACT: ""
          MF_FACT: ""
          CP_RELEASED: "Released"
          MF_RELEASED: ""

          JIRA_RELEASE_URL: ${{ secrets.JIRA_RELEASE_URL }}
          ISSUES_JQL_URL: ${{ secrets.ISSUES_JQL_URL }}

          CP_DEVOPS_TASK: ${{ secrets.CP_DEVOPS_TASK }}
          MF_DEVOPS_TASK: ${{ secrets.MF_DEVOPS_TASK }}
          JIRA_SERVER_ID: ${{ secrets.JIRA_SERVER_ID }}
          JIRA_SERVER_NAME: ${{ secrets.JIRA_SERVER_NAME }}
        run: |
          BODY=$(cat <<EOF
          <table data-table-width="1484" data-layout="align-start">
            <colgroup>
              <col style="width: 151.0px;" />
              <col style="width: 1333.0px;" />
            </colgroup>
            <tbody>
              <tr>
                <th><p><strong>Release planned</strong></p></th>
                <td>
                  <p>CP - <time datetime="${DATE}" /> <br />MF - <time datetime="${DATE}" /></p>
                </td>
              </tr>
              <tr>
                <th><p><strong>Release fact</strong></p></th>
                <td>
                  <p>CP - ${CP_FACT}<br />MF - ${MF_FACT}</p>
                </td>
              </tr>
              <tr>
                <th><p><strong>Release status</strong></p></th>
                <td>
                  <p>CP - ${CP_RELEASED}<br />MF - ${MF_RELEASED}</p>
                </td>
              </tr>
            </tbody>
          </table>

          <h2>Release notes</h2>
          <p>Ссылки на релизы в Jira</p>
          <ul>
            <li>
              <p>${PROJECT} - <a href="${JIRA_RELEASE_URL}">${JIRA_RELEASE_URL}</a></p>
            </li>
          </ul>

          <p>Что было сделано в рамках релиза</p>
          <p>#releaseb2b #релиз${SHORT_DATE} #${PROJECT} v${VERSION}</p>

          <p>Добавили</p>
          <ac:structured-macro ac:name="code" ac:schema-version="1">
            <ac:parameter ac:name="breakoutMode">wide</ac:parameter>
            <ac:parameter ac:name="breakoutWidth">1800</ac:parameter>
            <ac:plain-text-body><![CDATA[-]]></ac:plain-text-body>
          </ac:structured-macro>

          <p>Обновили</p>
          <ac:structured-macro ac:name="code" ac:schema-version="1">
            <ac:parameter ac:name="breakoutMode">wide</ac:parameter>
            <ac:parameter ac:name="breakoutWidth">1800</ac:parameter>
            <ac:plain-text-body><![CDATA[-]]></ac:plain-text-body>
          </ac:structured-macro>

          <p>Убрали</p>
          <ac:structured-macro ac:name="code" ac:schema-version="1">
            <ac:parameter ac:name="breakoutMode">wide</ac:parameter>
            <ac:parameter ac:name="breakoutWidth">1800</ac:parameter>
            <ac:plain-text-body><![CDATA[-]]></ac:plain-text-body>
          </ac:structured-macro>

          <h2><strong>Env changes</strong></h2>

          <p>Удалённые переменные:</p>
          <ac:structured-macro ac:name="code" ac:schema-version="1">
            <ac:parameter ac:name="breakoutMode">wide</ac:parameter>
            <ac:parameter ac:name="breakoutWidth">1800</ac:parameter>
            <ac:plain-text-body><![CDATA[-]]></ac:plain-text-body>
          </ac:structured-macro>

          <p>Новые переменные:</p>
          <ac:structured-macro ac:name="code" ac:schema-version="1">
            <ac:parameter ac:name="breakoutMode">wide</ac:parameter>
            <ac:parameter ac:name="breakoutWidth">1800</ac:parameter>
            <ac:plain-text-body><![CDATA[-]]></ac:plain-text-body>
          </ac:structured-macro>

          <p>Измененные переменные:</p>
          <ac:structured-macro ac:name="code" ac:schema-version="1">
            <ac:parameter ac:name="breakoutMode">wide</ac:parameter>
            <ac:parameter ac:name="breakoutWidth">1800</ac:parameter>
            <ac:plain-text-body><![CDATA[-]]></ac:plain-text-body>
          </ac:structured-macro>

          <h3>Jobs to run</h3>
          <p style="margin-left: 30.0px;"><strong>Для CP</strong>:</p>
          <p><strong>Для MF</strong>:</p>

          <h3>Pre-release tasks</h3>
          <ul>
            <li><p>CP</p></li>
            <li><p>MF</p></li>
          </ul>

          <h3>Release tasks</h3>
          <ul>
            <li>
              <p>
                CP
                <ac:structured-macro ac:name="jira" ac:schema-version="1">
                  <ac:parameter ac:name="key">${CP_DEVOPS_TASK}</ac:parameter>
                  <ac:parameter ac:name="serverId">${JIRA_SERVER_ID}</ac:parameter>
                  <ac:parameter ac:name="server">${JIRA_SERVER_NAME}</ac:parameter>
                </ac:structured-macro>
              </p>
            </li>
            <li>
              <p>
                MF
                <ac:structured-macro ac:name="jira" ac:schema-version="1">
                  <ac:parameter ac:name="key">${MF_DEVOPS_TASK}</ac:parameter>
                  <ac:parameter ac:name="serverId">${JIRA_SERVER_ID}</ac:parameter>
                  <ac:parameter ac:name="server">${JIRA_SERVER_NAME}</ac:parameter>
                </ac:structured-macro>
              </p>
            </li>
          </ul>

          <p><a href="${ISSUES_JQL_URL}">${ISSUES_JQL_URL}</a></p>
          EOF
          )

          jq -n \
            --arg spaceId "$SPACE_ID" \
            --arg status "current" \
            --arg title "$TITLE" \
            --arg parentId "$PARENT_ID" \
            --arg value "$BODY" \
            '{
              spaceId: $spaceId,
              status: $status,
              title: $title,
              parentId: $parentId,
              body: {
                representation: "storage",
                value: $value
              }
            }' > body.json

          HTTP=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "$BASE_URL/wiki/api/v2/pages" \
            -u "$EMAIL:$TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @body.json)

          echo "HTTP: $HTTP"
          cat response.json

          if [[ "$HTTP" -lt 200 || "$HTTP" -ge 300 ]]; then
            echo "Failed to create page"
            exit 1
          fi

          URL=$(jq -r 'if ._links and ._links.base and ._links.webui then (._links.base + ._links.webui) else "" end' response.json)

          if [[ -z "$URL" || "$URL" == "null" ]]; then
            echo "Confluence page URL not found"
            exit 1
          fi

          echo "page_url=$URL" >> "$GITHUB_OUTPUT"

  send-slack:
    name: Send Slack Message
    runs-on: ubuntu-latest
    needs:
      - init-release
      - create-confluence-page

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send message to Slack
        shell: bash
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          TAGS: ${{ needs.init-release.outputs.tags }}
          TITLE: ${{ needs.init-release.outputs.title }}
          URL: ${{ needs.create-confluence-page.outputs.page_url }}
        run: |
          TEXT="$TAGS

  $TITLE
  $URL"

jq -n --arg text "$TEXT" '{text: $text}' > payload.json
  
  cat payload.json
  
  HTTP=$(curl -s -o response.txt -w "%{http_code}" \
  -X POST \
-H "Content-Type: application/json" \
  --data @payload.json \
  "$WEBHOOK")

echo "HTTP: $HTTP"
  cat response.txt
  
  if [[ "$HTTP" -lt 200 || "$HTTP" -ge 300 ]]; then
  echo "Slack failed"
  exit 1
  fi

generate-release-note:
  name: Generate Artifact
  runs-on: ubuntu-latest
  needs:
    - init-release
    - create-confluence-page

  steps:
    - name: Create file
      shell: bash
      run: |
        cat <<EOF > release-note.md
        # ${{ needs.init-release.outputs.title }}
        
        Confluence:
        ${{ needs.create-confluence-page.outputs.page_url }}
        EOF

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-note
        path: release-note.md