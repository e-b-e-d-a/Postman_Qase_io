name: Release Flow (Step 1 - Confluence + Slack)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  validate-branch:
    name: Validate Branch
    runs-on: ubuntu-latest

    outputs:
      branch_name: ${{ steps.branch_check.outputs.branch_name }}

    steps:
      - name: Check branch name
        id: branch_check
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"

          echo "Current branch: $BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          if [[ "$BRANCH_NAME" == "master" || "$BRANCH_NAME" =~ ^release-.*$ ]]; then
            echo "Branch is valid"
          else
            echo "Invalid branch: $BRANCH_NAME"
            exit 1
          fi

  init-release:
    name: Init Release
    runs-on: ubuntu-latest
    needs: validate-branch

    outputs:
      project: ${{ steps.meta.outputs.project }}
      version: ${{ steps.meta.outputs.version }}
      date: ${{ steps.meta.outputs.date }}
      short_date: ${{ steps.meta.outputs.short_date }}
      date_iso: ${{ steps.meta.outputs.date_iso }}
      title: ${{ steps.meta.outputs.title }}
      tags: ${{ steps.meta.outputs.tags }}
      branch_name: ${{ steps.meta.outputs.branch_name }}

    env:
      PROJECT: postman-test

    steps:
      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          DATE=$(date +'%d.%m.%Y')
          SHORT_DATE=$(date +'%d.%m')
          DATE_ISO=$(date +'%Y-%m-%d')
          BRANCH_NAME="${{ needs.validate-branch.outputs.branch_name }}"

          TITLE="Draft $PROJECT v$VERSION"
          TAGS="#releaseb2b #релиз$SHORT_DATE #$PROJECT v$VERSION"

          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "short_date=$SHORT_DATE" >> "$GITHUB_OUTPUT"
          echo "date_iso=$DATE_ISO" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

  create-confluence-page:
    name: Create Confluence Page
    runs-on: ubuntu-latest
    needs: init-release

    outputs:
      page_path: ${{ steps.create.outputs.page_path }}

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create Confluence page
        id: create
        shell: bash
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          SPACE_ID: ${{ secrets.CONFLUENCE_SPACE_ID }}
          PARENT_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}

          TITLE: ${{ needs.init-release.outputs.title }}
          DATE: ${{ needs.init-release.outputs.date_iso }}
          SHORT_DATE: ${{ needs.init-release.outputs.short_date }}
          VERSION: ${{ needs.init-release.outputs.version }}
          PROJECT: ${{ needs.init-release.outputs.project }}
          TAGS: ${{ needs.init-release.outputs.tags }}

          JIRA_RELEASE_URL: ${{ secrets.JIRA_RELEASE_URL }}
          ISSUES_JQL_URL: ${{ secrets.ISSUES_JQL_URL }}

        run: |
          BODY=$(cat <<EOF
          <h1>${TITLE}</h1>

          <table>
            <tbody>
              <tr>
                <th><strong>Release planned</strong></th>
                <td>
                  CP - ${DATE}<br/>
                  MF -
                </td>
              </tr>
              <tr>
                <th><strong>Release fact</strong></th>
                <td>
                  CP -<br/>
                  MF -
                </td>
              </tr>
              <tr>
                <th><strong>Release status</strong></th>
                <td>
                  CP - Planned<br/>
                  MF -
                </td>
              </tr>
            </tbody>
          </table>

          <h2>Release notes</h2>

          <p><strong>Jira releases:</strong></p>
          <ul>
            <li>${PROJECT} - <a href="${JIRA_RELEASE_URL}">${JIRA_RELEASE_URL}</a></li>
          </ul>

          <p><strong>Summary:</strong></p>
          <p>${TAGS}</p>

          <h3>Added</h3>
          <ul>
            <li><em>To be filled</em></li>
          </ul>

          <h3>Updated</h3>
          <ul>
            <li><em>To be filled</em></li>
          </ul>

          <h3>Removed</h3>
          <ul>
            <li><em>To be filled</em></li>
          </ul>

          <h2>Env changes</h2>

          <p><strong>Removed variables</strong></p>
          <ac:structured-macro ac:name="code">
            <ac:plain-text-body><![CDATA[-]]></ac:plain-text-body>
          </ac:structured-macro>

          <p><strong>New variables</strong></p>
          <ac:structured-macro ac:name="code">
            <ac:plain-text-body><![CDATA[-]]></ac:plain-text-body>
          </ac:structured-macro>

          <p><strong>Updated variables</strong></p>
          <ac:structured-macro ac:name="code">
            <ac:plain-text-body><![CDATA[-]]></ac:plain-text-body>
          </ac:structured-macro>

          <h3>Jobs to run</h3>

          <p><strong>CP:</strong></p>
          <ul>
            <li><em>To be filled</em></li>
          </ul>

          <p><strong>MF:</strong></p>
          <ul>
            <li><em>To be filled</em></li>
          </ul>

          <h3>Pre-release tasks</h3>
          <ul>
            <li>CP -</li>
            <li>MF -</li>
          </ul>

          <h3>Release tasks</h3>
          <ul>
            <li>CP -</li>
            <li>MF -</li>
          </ul>

          <h2>Issues</h2>
          <p><a href="${ISSUES_JQL_URL}">${ISSUES_JQL_URL}</a></p>

          EOF
          )

          jq -n \
            --arg spaceId "$SPACE_ID" \
            --arg status "current" \
            --arg title "$TITLE" \
            --arg parentId "$PARENT_ID" \
            --arg value "$BODY" \
            '{
              spaceId: $spaceId,
              status: $status,
              title: $title,
              parentId: $parentId,
              body: {
                representation: "storage",
                value: $value
              }
            }' > body.json

          HTTP=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "$BASE_URL/wiki/api/v2/pages" \
            -u "$EMAIL:$TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @body.json)

          echo "HTTP: $HTTP"
          cat response.json

          if [[ "$HTTP" -lt 200 || "$HTTP" -ge 300 ]]; then
            echo "Failed to create page"
            exit 1
          fi

          PAGE_PATH=$(jq -r '._links.webui // ""' response.json)

          echo "PAGE_PATH=$PAGE_PATH"

          if [[ -z "$PAGE_PATH" || "$PAGE_PATH" == "null" ]]; then
            echo "Failed to extract page path"
            exit 1
          fi

          echo "page_path=$PAGE_PATH" >> "$GITHUB_OUTPUT"

  send-slack:
    name: Send Slack Message
    runs-on: ubuntu-latest
    needs:
      - init-release
      - create-confluence-page

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Debug Slack inputs
        shell: bash
        env:
          CONFLUENCE_SITE_URL: ${{ vars.CONFLUENCE_SITE_URL }}
          TITLE: ${{ needs.init-release.outputs.title }}
          TAGS: ${{ needs.init-release.outputs.tags }}
          PAGE_PATH: ${{ needs.create-confluence-page.outputs.page_path }}
        run: |
          URL="${CONFLUENCE_SITE_URL%/}/wiki${PAGE_PATH}"

          echo "TITLE=$TITLE"
          echo "TAGS=$TAGS"
          echo "PAGE_PATH=$PAGE_PATH"
          echo "URL=$URL"

          if [[ -z "$PAGE_PATH" ]]; then
            echo "PAGE_PATH is empty, cannot build clickable Slack link"
            exit 1
          fi

          if [[ -z "$CONFLUENCE_SITE_URL" ]]; then
            echo "CONFLUENCE_SITE_URL is empty"
            exit 1
          fi

      - name: Send message
        shell: bash
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          CONFLUENCE_SITE_URL: ${{ vars.CONFLUENCE_SITE_URL }}
          TAGS: ${{ needs.init-release.outputs.tags }}
          TITLE: ${{ needs.init-release.outputs.title }}
          PAGE_PATH: ${{ needs.create-confluence-page.outputs.page_path }}
        run: |
          URL="${CONFLUENCE_SITE_URL%/}/wiki${PAGE_PATH}"

          jq -n \
            --arg tags "$TAGS" \
            --arg title "$TITLE" \
            --arg url "$URL" \
            '{
              text: $title,
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: $tags
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "<\($url)|\($title)>"
                  }
                }
              ]
            }' > payload.json

          echo "=== Slack payload ==="
          cat payload.json

          HTTP=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            --data @payload.json \
            "$WEBHOOK")

          echo "HTTP: $HTTP"
          cat response.txt

          if [[ "$HTTP" -lt 200 || "$HTTP" -ge 300 ]]; then
            echo "Slack failed"
            exit 1
          fi

  generate-release-note:
    name: Generate Artifact
    runs-on: ubuntu-latest
    needs:
      - init-release
      - create-confluence-page

    steps:
      - name: Create file
        shell: bash
        env:
          CONFLUENCE_SITE_URL: ${{ vars.CONFLUENCE_SITE_URL }}
          PAGE_PATH: ${{ needs.create-confluence-page.outputs.page_path }}
        run: |
          URL="${CONFLUENCE_SITE_URL%/}/wiki${PAGE_PATH}"

          cat <<EOF > release-note.md
          # ${{ needs.init-release.outputs.title }}

          Confluence:
          ${URL}
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-note
          path: release-note.md
